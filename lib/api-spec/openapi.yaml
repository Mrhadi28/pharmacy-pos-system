openapi: 3.1.0
info:
  title: Api
  version: 2.0.0
  description: PharmaPOS Pakistan - Complete Pharmacy Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: pharmacies
  - name: users
  - name: medicines
  - name: categories
  - name: suppliers
  - name: customers
  - name: sales
  - name: credit
  - name: purchases
  - name: reports
  - name: dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerPharmacy
      tags: [auth]
      summary: Register a new pharmacy + owner account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Reset password using registered phone verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation or phone mismatch
        "404":
          description: Username not found

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /pharmacies/me:
    get:
      operationId: getMyPharmacy
      tags: [pharmacies]
      summary: Get current pharmacy info
      responses:
        "200":
          description: Pharmacy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pharmacy"
    put:
      operationId: updateMyPharmacy
      tags: [pharmacies]
      summary: Update pharmacy info
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePharmacyInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pharmacy"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: Get all users for current pharmacy
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserPublic"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user for current pharmacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /medicines:
    get:
      operationId: getMedicines
      tags: [medicines]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Medicines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medicine"
    post:
      operationId: createMedicine
      tags: [medicines]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicineInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"

  /medicines/{id}:
    get:
      operationId: getMedicine
      tags: [medicines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medicine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"
    put:
      operationId: updateMedicine
      tags: [medicines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMedicineInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"
    delete:
      operationId: deleteMedicine
      tags: [medicines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /suppliers:
    get:
      operationId: getSuppliers
      tags: [suppliers]
      responses:
        "200":
          description: Suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    put:
      operationId: updateSupplier
      tags: [suppliers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /customers:
    get:
      operationId: getCustomers
      tags: [customers]
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    put:
      operationId: updateCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /sales:
    get:
      operationId: getSales
      tags: [sales]
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: integer
        - name: paymentStatus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /credit:
    get:
      operationId: getCreditSales
      tags: [credit]
      summary: Get all unpaid/partial credit sales (Khata)
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Credit sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"

  /credit/{saleId}/pay:
    post:
      operationId: recordCreditPayment
      tags: [credit]
      summary: Record a payment against a credit sale
      parameters:
        - name: saleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditPaymentInput"
      responses:
        "200":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /credit/customer/{customerId}:
    get:
      operationId: getCustomerCredit
      tags: [credit]
      summary: Get total outstanding credit for a customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer credit summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerCreditSummary"

  /purchases:
    get:
      operationId: getPurchases
      tags: [purchases]
      responses:
        "200":
          description: Purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
    post:
      operationId: createPurchase
      tags: [purchases]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /purchases/{id}/receive:
    post:
      operationId: receivePurchase
      tags: [purchases]
      summary: Mark purchase as received and update stock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase received, stock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /reports/sales-summary:
    get:
      operationId: getSalesSummary
      tags: [reports]
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, year]
      responses:
        "200":
          description: Sales summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesSummary"

  /reports/top-medicines:
    get:
      operationId: getTopMedicines
      tags: [reports]
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, year]
      responses:
        "200":
          description: Top medicines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopMedicine"

  /reports/expiring-medicines:
    get:
      operationId: getExpiringMedicines
      tags: [reports]
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Expiring medicines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medicine"

  /reports/alerts:
    get:
      operationId: getAlerts
      tags: [reports]
      summary: Get all active alerts (low stock + expiring)
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertsResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    RegisterInput:
      type: object
      properties:
        pharmacyName:
          type: string
        ownerName:
          type: string
        username:
          type: string
        password:
          type: string
        phone:
          type: string
        city:
          type: string
        address:
          type: string
      required: [pharmacyName, ownerName, username, password, phone]

    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    ForgotPasswordInput:
      type: object
      properties:
        username:
          type: string
        phone:
          type: string
        newPassword:
          type: string
          minLength: 6
      required: [username, phone, newPassword]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserPublic"
        pharmacy:
          $ref: "#/components/schemas/Pharmacy"
      required: [user, pharmacy]

    Pharmacy:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        ownerName:
          type: string
        licenseNumber:
          type: string
        email:
          type: string
        city:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, name, isActive, createdAt]

    UpdatePharmacyInput:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        ownerName:
          type: string
        licenseNumber:
          type: string
        email:
          type: string
        city:
          type: string

    UserPublic:
      type: object
      properties:
        id:
          type: integer
        pharmacyId:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
        phone:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, pharmacyId, username, fullName, role, isActive, createdAt]

    CreateUserInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        fullName:
          type: string
        role:
          type: string
        phone:
          type: string
      required: [username, password, fullName, role]

    UpdateUserInput:
      type: object
      properties:
        fullName:
          type: string
        role:
          type: string
        phone:
          type: string
        isActive:
          type: boolean
        password:
          type: string

    DashboardStats:
      type: object
      properties:
        todaySales:
          type: number
        todayTransactions:
          type: integer
        totalMedicines:
          type: integer
        lowStockCount:
          type: integer
        expiringCount:
          type: integer
        monthlyRevenue:
          type: number
        weeklyRevenue:
          type: number
        totalCreditOutstanding:
          type: number
        recentSales:
          type: array
          items:
            $ref: "#/components/schemas/Sale"
      required: [todaySales, todayTransactions, totalMedicines, lowStockCount, expiringCount, monthlyRevenue, weeklyRevenue, totalCreditOutstanding, recentSales]

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
      required: [id, name, createdAt]

    CreateCategoryInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required: [name]

    Medicine:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        genericName:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        supplierId:
          type: integer
        supplierName:
          type: string
        batchNumber:
          type: string
        barcode:
          type: string
        purchasePrice:
          type: number
        salePrice:
          type: number
        stockQuantity:
          type: integer
        minStockLevel:
          type: integer
        unit:
          type: string
        expiryDate:
          type: string
        manufacturingDate:
          type: string
        manufacturer:
          type: string
        description:
          type: string
        requiresPrescription:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, name, salePrice, stockQuantity, minStockLevel, unit, isActive, createdAt]

    CreateMedicineInput:
      type: object
      properties:
        name:
          type: string
        genericName:
          type: string
        categoryId:
          type: integer
        supplierId:
          type: integer
        batchNumber:
          type: string
        barcode:
          type: string
        purchasePrice:
          type: number
        salePrice:
          type: number
        stockQuantity:
          type: integer
        minStockLevel:
          type: integer
        unit:
          type: string
        expiryDate:
          type: string
        manufacturingDate:
          type: string
        manufacturer:
          type: string
        description:
          type: string
        requiresPrescription:
          type: boolean
      required: [name, salePrice, stockQuantity, unit]

    UpdateMedicineInput:
      type: object
      properties:
        name:
          type: string
        genericName:
          type: string
        categoryId:
          type: integer
        supplierId:
          type: integer
        batchNumber:
          type: string
        barcode:
          type: string
        purchasePrice:
          type: number
        salePrice:
          type: number
        stockQuantity:
          type: integer
        minStockLevel:
          type: integer
        unit:
          type: string
        expiryDate:
          type: string
        manufacturingDate:
          type: string
        manufacturer:
          type: string
        description:
          type: string
        requiresPrescription:
          type: boolean
        isActive:
          type: boolean

    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        city:
          type: string
        ntn:
          type: string
        createdAt:
          type: string
      required: [id, name, phone, createdAt]

    CreateSupplierInput:
      type: object
      properties:
        name:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        city:
          type: string
        ntn:
          type: string
      required: [name, phone]

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        cnic:
          type: string
        dateOfBirth:
          type: string
        totalPurchases:
          type: number
        totalCredit:
          type: number
        visitCount:
          type: integer
        createdAt:
          type: string
      required: [id, name, phone, createdAt]

    CreateCustomerInput:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        cnic:
          type: string
        dateOfBirth:
          type: string
      required: [name, phone]

    SaleItem:
      type: object
      properties:
        id:
          type: integer
        medicineId:
          type: integer
        medicineName:
          type: string
        medicineUnit:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        discount:
          type: number
        total:
          type: number
      required: [id, medicineId, medicineName, medicineUnit, quantity, unitPrice, discount, total]

    Sale:
