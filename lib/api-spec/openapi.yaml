openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: PharmaPOS Pakistan - Pharmacy Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: medicines
    description: Medicine inventory management
  - name: categories
    description: Medicine categories
  - name: suppliers
    description: Supplier management
  - name: customers
    description: Customer management
  - name: sales
    description: Sales and billing
  - name: purchases
    description: Purchase orders
  - name: reports
    description: Reports and analytics
  - name: users
    description: User management
  - name: dashboard
    description: Dashboard data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: Get all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryInput"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /medicines:
    get:
      operationId: getMedicines
      tags: [medicines]
      summary: Get all medicines
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of medicines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medicine"
    post:
      operationId: createMedicine
      tags: [medicines]
      summary: Create a medicine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicineInput"
      responses:
        "201":
          description: Medicine created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"

  /medicines/{id}:
    get:
      operationId: getMedicine
      tags: [medicines]
      summary: Get a medicine by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medicine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"
    put:
      operationId: updateMedicine
      tags: [medicines]
      summary: Update a medicine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMedicineInput"
      responses:
        "200":
          description: Medicine updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"
    delete:
      operationId: deleteMedicine
      tags: [medicines]
      summary: Delete a medicine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /suppliers:
    get:
      operationId: getSuppliers
      tags: [suppliers]
      summary: Get all suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierInput"
      responses:
        "201":
          description: Supplier created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    put:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierInput"
      responses:
        "200":
          description: Supplier updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Delete a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /customers:
    get:
      operationId: getCustomers
      tags: [customers]
      summary: Get all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerInput"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerInput"
      responses:
        "200":
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /sales:
    get:
      operationId: getSales
      tags: [sales]
      summary: Get all sales
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a sale (checkout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleInput"
      responses:
        "201":
          description: Sale created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      summary: Get a sale by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /purchases:
    get:
      operationId: getPurchases
      tags: [purchases]
      summary: Get all purchases
      responses:
        "200":
          description: List of purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
    post:
      operationId: createPurchase
      tags: [purchases]
      summary: Create a purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseInput"
      responses:
        "201":
          description: Purchase created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /reports/sales-summary:
    get:
      operationId: getSalesSummary
      tags: [reports]
      summary: Get sales summary for a date range
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, year]
      responses:
        "200":
          description: Sales summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesSummary"

  /reports/top-medicines:
    get:
      operationId: getTopMedicines
      tags: [reports]
      summary: Get top selling medicines
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, year]
      responses:
        "200":
          description: Top medicines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopMedicine"

  /reports/expiring-medicines:
    get:
      operationId: getExpiringMedicines
      tags: [reports]
      summary: Get medicines expiring soon
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Expiring medicines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medicine"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    DashboardStats:
      type: object
      properties:
        todaySales:
          type: number
        todayTransactions:
          type: integer
        totalMedicines:
          type: integer
        lowStockCount:
          type: integer
        expiringCount:
          type: integer
        monthlyRevenue:
          type: number
        weeklyRevenue:
          type: number
        recentSales:
          type: array
          items:
            $ref: "#/components/schemas/Sale"
      required: [todaySales, todayTransactions, totalMedicines, lowStockCount, expiringCount, monthlyRevenue, weeklyRevenue, recentSales]

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
      required: [id, name, createdAt]

    CreateCategoryInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required: [name]

    Medicine:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        genericName:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        supplierId:
          type: integer
        supplierName:
          type: string
        batchNumber:
          type: string
        barcode:
          type: string
        purchasePrice:
          type: number
        salePrice:
          type: number
        stockQuantity:
          type: integer
        minStockLevel:
          type: integer
        unit:
          type: string
        expiryDate:
          type: string
        manufacturingDate:
          type: string
        manufacturer:
          type: string
        description:
          type: string
        requiresPrescription:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, name, salePrice, stockQuantity, minStockLevel, unit, isActive, createdAt]

    CreateMedicineInput:
      type: object
      properties:
        name:
          type: string
        genericName:
          type: string
        categoryId:
          type: integer
        supplierId:
          type: integer
        batchNumber:
          type: string
        barcode:
          type: string
        purchasePrice:
          type: number
        salePrice:
          type: number
        stockQuantity:
          type: integer
        minStockLevel:
          type: integer
        unit:
          type: string
        expiryDate:
          type: string
        manufacturingDate:
          type: string
        manufacturer:
          type: string
        description:
          type: string
        requiresPrescription:
          type: boolean
      required: [name, salePrice, stockQuantity, unit]

    UpdateMedicineInput:
      type: object
      properties:
        name:
          type: string
        genericName:
          type: string
        categoryId:
          type: integer
        supplierId:
          type: integer
        batchNumber:
          type: string
        barcode:
          type: string
        purchasePrice:
          type: number
        salePrice:
          type: number
        stockQuantity:
          type: integer
        minStockLevel:
          type: integer
        unit:
          type: string
        expiryDate:
          type: string
        manufacturingDate:
          type: string
        manufacturer:
          type: string
        description:
          type: string
        requiresPrescription:
          type: boolean
        isActive:
          type: boolean

    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        city:
          type: string
        ntn:
          type: string
        createdAt:
          type: string
      required: [id, name, phone, createdAt]

    CreateSupplierInput:
      type: object
      properties:
        name:
          type: string
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        city:
          type: string
        ntn:
          type: string
      required: [name, phone]

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        cnic:
          type: string
        dateOfBirth:
          type: string
        totalPurchases:
          type: number
        visitCount:
          type: integer
        createdAt:
          type: string
      required: [id, name, phone, createdAt]

    CreateCustomerInput:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        cnic:
          type: string
        dateOfBirth:
          type: string
      required: [name, phone]

    SaleItem:
      type: object
      properties:
        id:
          type: integer
        medicineId:
          type: integer
        medicineName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        discount:
          type: number
        total:
          type: number
      required: [id, medicineId, medicineName, quantity, unitPrice, discount, total]

    Sale:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        customerId:
          type: integer
        customerName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
        subtotal:
          type: number
        discount:
          type: number
        tax:
          type: number
        totalAmount:
          type: number
        paidAmount:
          type: number
        changeAmount:
          type: number
        paymentMethod:
          type: string
          enum: [cash, card, jazzcash, easypaisa]
        status:
          type: string
          enum: [completed, refunded]
        notes:
          type: string
        createdAt:
          type: string
      required: [id, invoiceNumber, items, subtotal, discount, tax, totalAmount, paidAmount, changeAmount, paymentMethod, status, createdAt]

    CreateSaleInput:
      type: object
      properties:
        customerId:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              medicineId:
                type: integer
              quantity:
                type: integer
              discount:
                type: number
            required: [medicineId, quantity]
        discount:
          type: number
        paidAmount:
          type: number
        paymentMethod:
          type: string
          enum: [cash, card, jazzcash, easypaisa]
        notes:
          type: string
      required: [items, paidAmount, paymentMethod]

    PurchaseItem:
      type: object
      properties:
        id:
          type: integer
        medicineId:
          type: integer
        medicineName:
          type: string
        quantity:
          type: integer
        unitCost:
          type: number
        total:
          type: number
      required: [id, medicineId, medicineName, quantity, unitCost, total]

    Purchase:
      type: object
      properties:
        id:
          type: integer
        poNumber:
          type: string
        supplierId:
          type: integer
        supplierName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseItem"
        totalAmount:
          type: number
        status:
          type: string
          enum: [pending, received, cancelled]
        notes:
          type: string
        createdAt:
          type: string
      required: [id, poNumber, supplierId, supplierName, items, totalAmount, status, createdAt]

    CreatePurchaseInput:
      type: object
      properties:
        supplierId:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              medicineId:
                type: integer
              quantity:
                type: integer
              unitCost:
                type: number
            required: [medicineId, quantity, unitCost]
        notes:
          type: string
        status:
          type: string
          enum: [pending, received, cancelled]
      required: [supplierId, items]

    SalesSummary:
      type: object
      properties:
        totalRevenue:
          type: number
        totalTransactions:
          type: integer
        averageTransaction:
          type: number
        dailyBreakdown:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              revenue:
                type: number
              transactions:
                type: integer
            required: [date, revenue, transactions]
      required: [totalRevenue, totalTransactions, averageTransaction, dailyBreakdown]

    TopMedicine:
      type: object
      properties:
        medicineId:
          type: integer
        medicineName:
          type: string
        quantitySold:
          type: integer
        revenue:
          type: number
      required: [medicineId, medicineName, quantitySold, revenue]
